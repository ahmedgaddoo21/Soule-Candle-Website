<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Soul Candles ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        amber: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-amber-50 text-amber-900 dark:bg-neutral-900 dark:text-amber-100 transition-colors duration-300 font-sans antialiased">

    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-20 px-4 max-w-6xl mx-auto">
        <h1 class="font-serif text-4xl font-bold mb-10 dark:text-white">My Account</h1>
        
        <div class="grid md:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="md:col-span-1">
                <div class="bg-white dark:bg-neutral-800 rounded-2xl p-6 shadow-sm border border-amber-100 dark:border-neutral-700">
                    <div class="text-center mb-6">
                        <div class="relative w-24 h-24 mx-auto mb-4">
                            <img id="user-avatar" src="" class="w-full h-full rounded-full object-cover border-4 border-amber-100 dark:border-neutral-700">
                            <label class="absolute bottom-0 right-0 bg-amber-800 text-white p-2 rounded-full cursor-pointer hover:bg-amber-900 transition-colors shadow-md">
                                <i class="ph ph-camera text-sm"></i>
                                <input type="file" id="avatar-input" accept="image/*" class="hidden">
                            </label>
                        </div>
                        <h2 id="user-name" class="font-serif text-lg font-bold dark:text-white"></h2>
                        <p id="user-email" class="text-sm text-amber-500 dark:text-amber-400"></p>
                    </div>
                    
                    <nav class="space-y-1">
                        <button onclick="showTab('about')" id="tab-btn-about" class="w-full text-left px-4 py-3 rounded-lg bg-amber-100 dark:bg-neutral-700 text-amber-800 dark:text-white font-medium flex items-center gap-3 transition-colors">
                            <i class="ph ph-user"></i> Profile
                        </button>
                        <button onclick="showTab('orders')" id="tab-btn-orders" class="w-full text-left px-4 py-3 rounded-lg hover:bg-amber-50 dark:hover:bg-neutral-700 text-amber-700 dark:text-amber-300 font-medium flex items-center gap-3 transition-colors">
                            <i class="ph ph-package"></i> My Orders
                        </button>
                        <button onclick="showTab('security')" id="tab-btn-security" class="w-full text-left px-4 py-3 rounded-lg hover:bg-amber-50 dark:hover:bg-neutral-700 text-amber-700 dark:text-amber-300 font-medium flex items-center gap-3 transition-colors">
                            <i class="ph ph-lock-key"></i> Security
                        </button>
                        <button onclick="logoutUser(); window.location.href='index.html'" class="w-full text-left px-4 py-3 rounded-lg hover:bg-red-50 text-red-600 font-medium flex items-center gap-3 transition-colors mt-4">
                            <i class="ph ph-sign-out"></i> Logout
                        </button>
                    </nav>
                </div>
            </div>

            <!-- Content -->
            <div class="md:col-span-3">
                <!-- Profile Tab -->
                <div id="tab-about" class="bg-white dark:bg-neutral-800 rounded-2xl p-8 shadow-sm border border-amber-100 dark:border-neutral-700">
                    <h3 class="font-serif text-2xl font-bold mb-6 dark:text-white">Profile Information</h3>
                    <form id="profile-form" class="space-y-5">
                        <div class="grid md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Full Name</label>
                                <input type="text" name="name" id="edit-name" class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Phone Number</label>
                                <input type="tel" name="phone" id="edit-phone" class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Email Address</label>
                            <input type="email" id="edit-email" disabled class="w-full px-4 py-3 rounded-lg bg-gray-100 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 text-gray-500 cursor-not-allowed dark:text-gray-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Shipping Address</label>
                            <textarea name="address" id="edit-address" rows="3" class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white"></textarea>
                        </div>
                        <button type="submit" class="bg-amber-800 text-white px-6 py-3 rounded-lg font-medium hover:bg-amber-900 transition-colors">Save Changes</button>
                    </form>
                </div>

                <!-- Orders Tab -->
                <div id="tab-orders" class="hidden bg-white dark:bg-neutral-800 rounded-2xl p-8 shadow-sm border border-amber-100 dark:border-neutral-700">
                    <h3 class="font-serif text-2xl font-bold mb-6 dark:text-white">Order History</h3>
                    <div id="orders-list" class="space-y-4">
                        <!-- Orders injected here -->
                    </div>
                </div>

                <!-- Security Tab -->
                <div id="tab-security" class="hidden bg-white dark:bg-neutral-800 rounded-2xl p-8 shadow-sm border border-amber-100 dark:border-neutral-700">
                    <h3 class="font-serif text-2xl font-bold mb-6 dark:text-white">Change Password</h3>
                    <form id="password-form" class="space-y-5 max-w-md">
                        <div>
                            <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Current Password</label>
                            <input type="password" id="old-password" required class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">New Password</label>
                            <input type="password" id="new-password" required class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white">
                            <p class="text-xs text-amber-500 mt-1">Min 8 chars, 1 uppercase, 1 number</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-2">Confirm New Password</label>
                            <input type="password" id="confirm-password" required class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 outline-none dark:text-white">
                        </div>
                        <p class="text-red-500 text-sm hidden" id="password-match-error">Passwords do not match</p>
                        <p class="text-red-500 text-sm hidden" id="password-wrong-error">Current password is incorrect</p>
                        <button type="submit" class="bg-amber-800 text-white px-6 py-3 rounded-lg font-medium hover:bg-amber-900 transition-colors">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="shared.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }
        
        let currentTab = 'about';
        let user = getCurrentUser();
        
        function showTab(tab) {
            currentTab = tab;
            
            ['about', 'orders', 'security'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                const btn = document.getElementById(`tab-btn-${t}`);
                btn.classList.remove('bg-amber-100', 'dark:bg-neutral-700', 'text-amber-800', 'dark:text-white');
                btn.classList.add('hover:bg-amber-50', 'dark:hover:bg-neutral-700', 'text-amber-700', 'dark:text-amber-300');
            });
            
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            activeBtn.classList.remove('hover:bg-amber-50', 'dark:hover:bg-neutral-700', 'text-amber-700', 'dark:text-amber-300');
            activeBtn.classList.add('bg-amber-100', 'dark:bg-neutral-700', 'text-amber-800', 'dark:text-white');
        }
        
        function renderOrderProgress(status) {
            const steps = ['placed', 'processing', 'shipped', 'delivered'];
            const currentIndex = steps.indexOf(status);
            
            return `
                <div class="flex items-center justify-between mt-4">
                    ${steps.map((step, idx) => `
                        <div class="flex flex-col items-center flex-1">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${idx <= currentIndex ? 'bg-amber-800 text-white' : 'bg-amber-200 dark:bg-neutral-700 text-amber-600 dark:text-amber-400'}">
                                ${idx < currentIndex ? '<i class="ph-bold ph-check"></i>' : idx + 1}
                            </div>
                            <span class="text-xs mt-2 capitalize ${idx <= currentIndex ? 'text-amber-800 dark:text-amber-200 font-medium' : 'text-amber-400 dark:text-amber-500'}">${step}</span>
                        </div>
                        ${idx < steps.length - 1 ? `<div class="flex-1 h-1 mx-2 ${idx < currentIndex ? 'bg-amber-800' : 'bg-amber-200 dark:bg-neutral-700'}"></div>` : ''}
                    `).join('')}
                </div>
            `;
        }
        
        function loadUserData() {
            user = getCurrentUser();
            
            document.getElementById('user-avatar').src = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=fcd34d&color=78350f`;
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;
            
            document.getElementById('edit-name').value = user.name || '';
            document.getElementById('edit-phone').value = user.phone || '';
            document.getElementById('edit-email').value = user.email || '';
            document.getElementById('edit-address').value = user.address || '';
            
            const orders = user.orders || [];
            const ordersList = document.getElementById('orders-list');
            
            if (orders.length === 0) {
                ordersList.innerHTML = '<p class="text-amber-500 dark:text-amber-400 text-center py-8">No orders yet. Start shopping!</p>';
            } else {
                ordersList.innerHTML = orders.map(order => `
                    <div class="border border-amber-200 dark:border-neutral-700 rounded-xl p-5">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-sm text-amber-500 dark:text-amber-400">Order #${order.id}</span>
                                <p class="font-medium dark:text-white mt-1">${order.items.join(', ')}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-medium capitalize ${order.status === 'delivered' ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' : 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200'}">
                                ${order.status}
                            </span>
                        </div>
                        <div class="flex justify-between items-center text-sm text-amber-600 dark:text-amber-400 border-t border-amber-100 dark:border-neutral-700 pt-3 mb-4">
                            <span>${order.date}</span>
                            <span class="font-bold text-amber-900 dark:text-white">$${order.total.toFixed(2)}</span>
                        </div>
                        ${renderOrderProgress(order.status)}
                    </div>
                `).join('');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            
            document.getElementById('avatar-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('user-avatar').src = e.target.result;
                        updateUser({ avatar: e.target.result });
                        showToast('Profile picture updated');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const updates = {
                    name: document.getElementById('edit-name').value,
                    phone: document.getElementById('edit-phone').value,
                    address: document.getElementById('edit-address').value
                };
                updateUser(updates);
                document.getElementById('user-name').textContent = updates.name;
                showToast('Profile updated');
            });
            
            document.getElementById('password-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                document.getElementById('password-match-error').classList.add('hidden');
                document.getElementById('password-wrong-error').classList.add('hidden');
                
                const oldPass = document.getElementById('old-password').value;
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;
                
                const db = getDB();
                const dbUser = db.users.find(u => u.id === user.id);
                if (dbUser.password !== oldPass) {
                    document.getElementById('password-wrong-error').classList.remove('hidden');
                    return;
                }
                
                if (newPass !== confirmPass) {
                    document.getElementById('password-match-error').classList.remove('hidden');
                    return;
                }
                
                const strongRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
                if (!strongRegex.test(newPass)) {
                    showToast('Password must have 8+ chars, 1 uppercase, 1 number', 'error');
                    return;
                }
                
                dbUser.password = newPass;
                saveDB(db);
                e.target.reset();
                showToast('Password updated successfully');
            });
        });
    </script>
</body>
</html>
