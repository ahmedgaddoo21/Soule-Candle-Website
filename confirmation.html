<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Soul Candles ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        amber: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-amber-50 text-amber-900 dark:bg-neutral-900 dark:text-amber-100 transition-colors duration-300 font-sans antialiased">

    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-20 px-4 max-w-2xl mx-auto min-h-screen flex items-center justify-center">
        <div class="text-center w-full">
            <!-- Success Animation -->
            <div class="w-24 h-24 bg-green-100 dark:bg-green-900 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ph-bold ph-check text-4xl text-green-600 dark:text-green-400"></i>
            </div>
            
            <h1 class="font-serif text-4xl font-bold mb-4 dark:text-white">Order Confirmed!</h1>
            <p class="text-amber-600 dark:text-amber-300 mb-8">Thank you for your purchase. We've sent a confirmation email with your order details.</p>
            
            <div class="bg-white dark:bg-neutral-800 rounded-2xl p-8 shadow-sm border border-amber-100 dark:border-neutral-700 text-left mb-8">
                <div class="flex justify-between items-center mb-6 pb-6 border-b border-amber-100 dark:border-neutral-700">
                    <div>
                        <p class="text-sm text-amber-500 dark:text-amber-400">Order Number</p>
                        <p class="font-bold text-lg dark:text-white" id="order-id">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-amber-500 dark:text-amber-400">Date</p>
                        <p class="font-medium dark:text-white" id="order-date">-</p>
                    </div>
                </div>
                
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between">
                        <span class="text-amber-600 dark:text-amber-400">Subtotal</span>
                        <span class="dark:text-white" id="order-subtotal">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-amber-600 dark:text-amber-400">Shipping</span>
                        <span class="text-green-600">Free</span>
                    </div>
                    <div id="order-discount-row" class="flex justify-between text-green-600 hidden">
                        <span>Discount</span>
                        <span id="order-discount">-$0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold pt-3 border-t border-amber-100 dark:border-neutral-700">
                        <span class="dark:text-white">Total</span>
                        <span class="dark:text-white" id="order-total">$0.00</span>
                    </div>
                </div>
                
                <!-- Tracking -->
                <div class="bg-amber-50 dark:bg-neutral-700 rounded-xl p-4">
                    <p class="text-sm font-medium text-amber-800 dark:text-amber-200 mb-2">Order Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></div>
                        <span class="text-amber-700 dark:text-amber-300">Processing</span>
                    </div>
                    <p class="text-xs text-amber-500 dark:text-amber-400 mt-2">Estimated delivery: 3-5 business days</p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="shop.html" class="bg-amber-800 text-white px-8 py-3 rounded-lg font-medium hover:bg-amber-900 transition-colors">
                    Continue Shopping
                </a>
                <a href="profile.html" class="border border-amber-300 dark:border-neutral-600 text-amber-800 dark:text-amber-200 px-8 py-3 rounded-lg font-medium hover:bg-amber-100 dark:hover:bg-neutral-800 transition-colors">
                    View My Orders
                </a>
            </div>
        </div>
    </main>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = JSON.parse(localStorage.getItem('wickglow_last_order'));
            
            if (!lastOrder) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('order-id').textContent = lastOrder.id;
            document.getElementById('order-date').textContent = lastOrder.date;
            document.getElementById('order-subtotal').textContent = `$${lastOrder.subtotal.toFixed(2)}`;
            document.getElementById('order-total').textContent = `$${lastOrder.total.toFixed(2)}`;
            
            if (lastOrder.discount > 0) {
                document.getElementById('order-discount-row').classList.remove('hidden');
                document.getElementById('order-discount').textContent = `-$${lastOrder.discount.toFixed(2)}`;
            }
            
            localStorage.removeItem('wickglow_last_order');
        });
    </script>
</body>
</html>
