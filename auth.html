<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Soul Candles ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        amber: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-amber-50 text-amber-900 dark:bg-neutral-900 dark:text-amber-100 transition-colors duration-300 font-sans antialiased min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">
        <div class="bg-white dark:bg-neutral-800 rounded-3xl shadow-xl p-8 md:p-10 border border-amber-100 dark:border-neutral-700">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-100 dark:bg-neutral-700 mb-4">
                    <i class="ph-fill ph-candle text-3xl text-amber-700 dark:text-amber-400"></i>
                </a>
                <h1 id="auth-title" class="font-serif text-3xl font-bold text-amber-900 dark:text-white">Welcome Back</h1>
                <p id="auth-subtitle" class="text-amber-500 dark:text-amber-400 mt-2 text-sm">Sign in to continue</p>
            </div>

            <form id="auth-form" class="space-y-5">
                <div id="name-field" class="hidden">
                    <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-1">Full Name</label>
                    <input type="text" id="reg-name" class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all dark:text-white" placeholder="Jane Doe">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-1">Email Address</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all dark:text-white" placeholder="you@example.com">
                    <p class="text-red-500 text-xs mt-1 hidden" id="email-error">Please enter a valid email</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-amber-700 dark:text-amber-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="auth-password" required class="w-full px-4 py-3 rounded-lg bg-amber-50 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all dark:text-white" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-amber-400 hover:text-amber-600">
                            <i class="ph ph-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                    <p class="text-xs text-amber-500 mt-1" id="password-hint">Min 8 chars, 1 uppercase, 1 number</p>
                    <p class="text-red-500 text-xs mt-1 hidden" id="password-error">Invalid credentials</p>
                </div>

                <button type="submit" id="auth-submit" class="w-full bg-amber-800 text-white py-4 rounded-lg font-medium hover:bg-amber-900 transition-all transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-amber-600 dark:text-amber-400">
                <span id="toggle-text">Don't have an account?</span>
                <button onclick="toggleMode()" id="toggle-btn" class="text-amber-800 dark:text-amber-200 font-bold hover:underline ml-1">Sign up</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        let isRegisterMode = false;
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || 'index.html';
        
        if (isLoggedIn()) {
            window.location.href = redirectUrl;
        }
        
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const nameField = document.getElementById('name-field');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('auth-submit');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn = document.getElementById('toggle-btn');
            const hint = document.getElementById('password-hint');
            
            if (isRegisterMode) {
                nameField.classList.remove('hidden');
                title.textContent = 'Create Account';
                subtitle.textContent = 'Join our candle community';
                submitBtn.querySelector('span').textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign in';
                hint.classList.remove('hidden');
            } else {
                nameField.classList.add('hidden');
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Sign in to continue';
                submitBtn.querySelector('span').textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleBtn.textContent = 'Sign up';
                hint.classList.add('hidden');
            }
            
            document.getElementById('email-error').classList.add('hidden');
            document.getElementById('password-error').classList.add('hidden');
        }
        
        function togglePassword() {
            const input = document.getElementById('auth-password');
            const icon = document.getElementById('toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('ph-eye', 'ph-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('ph-eye-slash', 'ph-eye');
            }
        }
        
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            document.getElementById('email-error').classList.add('hidden');
            document.getElementById('password-error').classList.add('hidden');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('email-error').classList.remove('hidden');
                return;
            }
            
            const btn = document.getElementById('auth-submit');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>';
            btn.disabled = true;
            
            setTimeout(() => {
                if (isRegisterMode) {
                    const name = document.getElementById('reg-name').value;
                    const strongRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
                    
                    if (!strongRegex.test(password)) {
                        document.getElementById('password-error').textContent = 'Password must have 8+ chars, 1 uppercase, 1 number';
                        document.getElementById('password-error').classList.remove('hidden');
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        return;
                    }
                    
                    const result = registerUser(name, email, password);
                    if (result.success) {
                        showToast('Account created!');
                        window.location.href = redirectUrl;
                    } else {
                        document.getElementById('password-error').textContent = result.message;
                        document.getElementById('password-error').classList.remove('hidden');
                    }
                } else {
                    const result = loginUser(email, password);
                    if (result.success) {
                        showToast('Welcome back!');
                        window.location.href = redirectUrl;
                    } else {
                        document.getElementById('password-error').textContent = 'Invalid email or password';
                        document.getElementById('password-error').classList.remove('hidden');
                    }
                }
                
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1000);
        });
    </script>
</body>
</html>
